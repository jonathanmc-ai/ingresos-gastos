<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Superadmin — MiFinanzas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .superadmin-container {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(4, 6, 14, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content" style="margin-left: 0; width: 100%;">
            <!-- Topbar -->
            <header class="topbar">
                <div class="page-title">
                    <h1 id="page-title-text" style="color: var(--green);">Panel Superadministrador</h1>
                </div>
                <div class="topbar-actions">
                    <a href="index.html" class="btn btn-ghost" style="text-decoration: none;">Volver al App</a>
                    <button class="btn btn-ghost" id="logoutBtn" style="color: var(--red);">Cerrar sesión</button>
                </div>
            </header>

            <div class="superadmin-container">

                <div class="card">
                    <div class="header-action">
                        <h2>Crear Nueva Empresa Cliente</h2>
                        <p style="color: var(--text-muted); font-size: 14px;">Esto creará la empresa y su primer
                            administrador.</p>
                    </div>

                    <form id="createCompanyForm">
                        <div class="form-group">
                            <label class="form-label" for="companyName">Nombre de la Empresa</label>
                            <input class="form-input" type="text" id="companyName" placeholder="Ej: Coca-Cola S.A."
                                required />
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="adminName">Nombre del Administrador</label>
                                <input class="form-input" type="text" id="adminName" placeholder="Ej: Juan Pérez"
                                    required />
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="adminEmail">Correo del Administrador</label>
                                <input class="form-input" type="email" id="adminEmail" placeholder="admin@empresa.com"
                                    required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="adminPassword">Contraseña Inicial</label>
                            <input class="form-input" type="password" id="adminPassword" placeholder="Min. 6 caracteres"
                                required minlength="6" />
                        </div>

                        <button type="submit" class="btn btn-primary" id="btnCreate"
                            style="width: 100%; margin-top: 10px;">
                            Crear Empresa y Administrador
                        </button>
                    </form>

                    <div id="statusMessage" style="margin-top: 16px; padding: 12px; border-radius: 8px; display: none;">
                    </div>

                </div>

                <!-- Lista de Empresas -->
                <div class="card" style="margin-top: 24px;">
                    <div class="header-action">
                        <h2>Empresas Registradas</h2>
                    </div>

                    <div class="table-responsive" style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead>
                                <tr>
                                    <th
                                        style="padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; font-size: 13px;">
                                        Nombre Empresa</th>
                                    <th
                                        style="padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; font-size: 13px;">
                                        Email Admin</th>
                                    <th
                                        style="padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; font-size: 13px;">
                                        Fecha Alta</th>
                                    <th
                                        style="padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; font-size: 13px;">
                                        Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="companiesList">
                                <tr>
                                    <td colspan="3" style="text-align: center; padding: 16px;">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <!-- Edit Company Modal -->
    <div class="modal" id="editCompanyModal">
        <div class="modal-content" style="max-width: 400px; padding: 32px; border-radius: 16px;">
            <h2 style="margin-bottom: 24px; font-weight: 700;">Editar Empresa</h2>
            <form id="editCompanyForm">
                <input type="hidden" id="editCompanyId">
                <div class="form-group">
                    <label class="form-label" for="editCompanyName">Nombre de la Empresa</label>
                    <input type="text" class="form-input" id="editCompanyName" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editAdminEmail">Nuevo Correo (dejar en blanco para no
                        cambiar)</label>
                    <input type="email" class="form-input" id="editAdminEmail">
                </div>
                <div class="form-group">
                    <label class="form-label" for="editAdminPassword">Nueva Contraseña (vacío para no cambiar)</label>
                    <input type="password" class="form-input" id="editAdminPassword" minlength="6">
                </div>
                <div id="editStatusMessage"
                    style="display: none; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px;">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnSaveEdit">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Verificar Sesión y Rol (Protección de Ruta)
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_OUT') {
                    window.location.href = 'admin-login.html';
                }
            });

            let { data: { session } } = await supabaseClient.auth.getSession();

            if (!session) {
                window.location.href = 'admin-login.html';
                return;
            }

            // Comprobar si es superadmin leyendo la tabla profiles
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            if (profileError || profile?.role !== 'superadmin') {
                alert('Acceso Denegado. Solo el Superadministrador puede ver esta página.');
                window.location.href = 'index.html';
                return;
            }

            // Al entrar al panel superadmin, limpiamos cualquier estado de auditoría previo
            localStorage.removeItem('audit_company_id');
            localStorage.removeItem('audit_company_name');

            await fetchCompanies();

            // 2. Lógica del formulario
            const form = document.getElementById('createCompanyForm');
            const btnCreate = document.getElementById('btnCreate');
            const statusMessage = document.getElementById('statusMessage');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const companyName = document.getElementById('companyName').value;
                const adminName = document.getElementById('adminName').value;
                const adminEmail = document.getElementById('adminEmail').value;
                const adminPassword = document.getElementById('adminPassword').value;

                btnCreate.disabled = true;
                btnCreate.textContent = 'Creando...';
                statusMessage.style.display = 'none';

                // Llamar a nuestra función mágica (RPC) creada en SQL
                const { data, error } = await supabaseClient.rpc('create_company_admin', {
                    admin_email: adminEmail,
                    admin_password: adminPassword,
                    admin_name: adminName,
                    new_company_name: companyName
                });

                if (error) {
                    statusMessage.textContent = 'Error: ' + error.message;
                    statusMessage.style.background = 'var(--red-bg)';
                    statusMessage.style.color = 'var(--red)';
                    statusMessage.style.display = 'block';
                } else {
                    statusMessage.textContent = '¡Éxito! Empresa y Administrador creados correctamente.';
                    statusMessage.style.background = 'rgba(16, 185, 129, 0.2)';
                    statusMessage.style.color = 'var(--green)';
                    statusMessage.style.display = 'block';
                    form.reset();
                }

                btnCreate.disabled = false;
                btnCreate.textContent = 'Crear Empresa y Administrador';
            });

            // 3. Lógica de Logout
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
            });

        });

        // 4. Obtener la lista de empresas
        async function fetchCompanies() {
            // Utilizamos nuestra nueva función RPC para traer el email del admin
            const { data, error } = await supabaseClient.rpc('get_companies_with_admins');

            if (error) {
                console.error('Error fetching companies:', error);
                return;
            }

            const tbody = document.getElementById('companiesList');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 16px; color: var(--text-muted);">No hay empresas registradas.</td></tr>';
                return;
            }

            data.forEach(company => {
                const tr = document.createElement('tr');
                const date = new Date(company.created_at).toLocaleDateString();

                tr.innerHTML = `
                    <td style="padding: 16px; border-bottom: 1px solid var(--border); font-weight: 500;" id="comp-name-${company.company_id}">${company.company_name}</td>
                    <td style="padding: 16px; border-bottom: 1px solid var(--border); color: var(--text-muted);">${company.admin_email || 'Sin admin'}</td>
                    <td style="padding: 16px; border-bottom: 1px solid var(--border); color: var(--text-muted);">${date}</td>
                    <td style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px;">
                        <button class="btn btn-ghost" style="color: var(--blue); font-size: 13px; padding: 6px 10px;" onclick="auditCompany('${company.company_id}', '${company.company_name.replace(/'/g, "\\'")}')">Auditar</button>
                        <button class="btn btn-ghost" style="color: var(--text-primary); font-size: 13px; padding: 6px 10px;" onclick="openEditModal('${company.company_id}', '${company.company_name.replace(/'/g, "\\'")}', '${company.admin_email || ''}')">Editar</button>
                        <button class="btn btn-ghost" style="color: var(--red); font-size: 13px; border-color: var(--red-bg); padding: 6px 10px;" onclick="deleteCompany('${company.company_id}', '${company.company_name.replace(/'/g, "\\'")}')">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 5. Editar Empresa (Modal)
        function openEditModal(companyId, companyName, adminEmail) {
            document.getElementById('editCompanyId').value = companyId;
            document.getElementById('editCompanyName').value = companyName;
            document.getElementById('editAdminEmail').value = adminEmail;
            document.getElementById('editAdminPassword').value = '';
            document.getElementById('editStatusMessage').style.display = 'none';
            document.getElementById('editCompanyModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editCompanyModal').classList.remove('active');
        }

        document.getElementById('editCompanyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSaveEdit');
            const statusMsg = document.getElementById('editStatusMessage');

            btn.disabled = true;
            btn.textContent = 'Guardando...';
            statusMsg.style.display = 'none';

            const compId = document.getElementById('editCompanyId').value;
            const newName = document.getElementById('editCompanyName').value;
            const newEmail = document.getElementById('editAdminEmail').value;
            const newPass = document.getElementById('editAdminPassword').value;

            const { data, error } = await supabaseClient.rpc('update_company_admin', {
                p_company_id: compId,
                p_company_name: newName,
                p_admin_email: newEmail,
                p_admin_password: newPass
            });

            if (error) {
                statusMsg.textContent = 'Error: ' + error.message;
                statusMsg.style.background = 'var(--red-bg)';
                statusMsg.style.color = 'var(--red)';
                statusMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Guardar Cambios';
            } else {
                fetchCompanies();
                closeEditModal();
                alert('Cambios guardados correctamente.');
                btn.disabled = false;
                btn.textContent = 'Guardar Cambios';
            }
        });

        // 6. Eliminar Empresa
        async function deleteCompany(companyId, companyName) {
            const confirmDelete = confirm(`¿Estás SEGURO de que quieres eliminar la empresa "${companyName}" y TODOS SUS DATOS (Usuarios, Perfiles, Transacciones y Categorías relacionadas)?\n\nEsta acción NO se puede deshacer.`);
            if (!confirmDelete) return;

            // Double confirmation for destructive actions
            const doubleConfirm = prompt(`Escribe ELIMINAR para confirmar la destrucción de la empresa ${companyName}:`);
            if (doubleConfirm !== 'ELIMINAR') {
                alert("Eliminación cancelada.");
                return;
            }

            const { error } = await supabaseClient
                .from('companies')
                .delete()
                .eq('id', companyId);

            if (error) {
                alert("Error al eliminar la empresa: " + error.message);
            } else {
                alert("La empresa ha sido eliminada por completo.");
                fetchCompanies(); // Refrescar la lista
            }
        }

        // 5. Auditar Empresa (Suplantar)
        function auditCompany(companyId, companyName) {
            localStorage.setItem('audit_company_id', companyId);
            localStorage.setItem('audit_company_name', companyName);
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
